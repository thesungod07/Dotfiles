# ==========================================
# DYNAMIC COLOR EXTENSION (Pywal)
# ==========================================
source = /home/$USER/.cache/wal/colors-hyprland

general {
    disable_loading_bar = false
    hide_cursor = false # Kept visible so you can see where you are clicking between fields
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

# ==========================================
# SCREENSHOT BLUR (Kept exactly as requested)
# ==========================================
background {
    monitor =
    path = screenshot
    blur_size = 5
    blur_passes = 3
    brightness = 0.5
    contrast = 1.0
}

# ==========================================
# FIELD 1: USERNAME INPUT
# ==========================================
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    
    inner_color = rgba(255, 255, 255, 0.08)
    outer_color = $color5 # Uses your secondary accent color to differentiate it
    font_color = rgb(242, 243, 244)
    font_family = CodeNewRoman Nerd Font Propo
    
    # Text displays as typed characters instead of password dots
    dots_size = 0.22
    dots_spacing = 0.35
    dots_center = true
    fade_on_empty = false
    rounding = 12
    placeholder_text = <span foreground="##f2f3f4" alpha="0.65">Enter Username...</span>
    
    shadow_color = rgba(0,0,0,0.4)
    shadow_passes = 1
    shadow_size = 3
    
    # Placed neatly above the password box
    position = 0, -65
    halign = center
    valign = center
}

# ==========================================
# FIELD 2: PASSWORD INPUT
# ==========================================
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    
    inner_color = rgba(255, 255, 255, 0.08)
    outer_color = $color9
    font_color = rgb(242, 243, 244)
    font_family = CodeNewRoman Nerd Font Propo
    
    check_color = $color4            
    fail_color = rgb(243, 139, 168)   
    
    fail_text = <i><b>$FAIL</b> ($ATTEMPTS)</i>
    fail_timeout = 1500               
    fail_transition = 200             
    
    dots_size = 0.22
    dots_spacing = 0.35
    dots_center = true
    fade_on_empty = false
    rounding = 12
    placeholder_text = <span foreground="##f2f3f4" alpha="0.65">Input Password...</span>
    
    shadow_color = rgba(0,0,0,0.4)
    shadow_passes = 1
    shadow_size = 3
    
    position = 0, -130
    halign = center
    valign = center
}

# ==========================================
# THE CLOCK (Kept exactly as requested)
# ==========================================
label {
    monitor =
    text = cmd[update:1000] date +"<b>%I</b>:<b>%M</b>"
    color = $color9
    font_size = 100
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0,0,0,0.4)
    
    position = 0, 120
    halign = center
    valign = center
}

# ==========================================
# THE DATE (Kept exactly as requested)
# ==========================================
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %B %d")"
    color = $color4
    font_size = 24
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 1
    shadow_size = 3
    
    position = 0, 230
    halign = center
    valign = center
}
